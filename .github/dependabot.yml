version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # Rust / Tauri backend
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  # The GitHub Actions themselves (checkout, setup-node, tauri-action, …)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
