name: Retry failed release

# The macOS DMG bundling step (bundle_dmg.sh) flakes intermittently on GitHub runners.
# When a Release run fails, re-run just its failed jobs once — the same manual fix, automated.
# The run_attempt guard stops it after one retry so a genuinely-broken build can't loop.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 2
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
