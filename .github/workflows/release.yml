name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Bumps the patch version once and pushes the bump commit; the platform builds all
  # check out that commit so every artifact carries the same version.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        id: bump
        shell: bash
        run: |
          current=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          new_version="$major.$minor.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          npm version "$new_version" --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = '$new_version';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: release v$new_version [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            # Universal binary so the .dmg runs on both Apple Silicon and Intel Macs.
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout (bumped commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # The catalog is embedded via include_str! and only parsed at RUNTIME, so a malformed
      # or schema-invalid catalog.json builds fine but crashes the app on launch. These tests
      # (which include catalog_json_parses) fail the release instead. Live/network sweeps are
      # skipped so a flaky host can't block a release. Windows runner only — the check is
      # platform-independent and this keeps the mac build fast.
      - name: Validate catalog + unit tests
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri
        run: cargo test --lib -- --skip live_tests --skip full_catalog_sweep

      # Draft until EVERY platform has uploaded. The mac build finishes first, and a live
      # release at that moment serves a latest.json with only darwin platforms — Windows
      # update checks in that window fail with "none of the fallback platforms were found".
      # The publish job below flips the draft live only once all builds succeed.
      - name: Build, sign, and upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: v${{ needs.version.outputs.version }}
          releaseBody: Automated release built from the latest push to master.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Publishes the draft only when both platform builds succeeded, so releases/latest (and the
  # updater's latest.json) always points at a complete release. A failed build leaves the
  # draft unpublished and users stay on the previous version.
  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ needs.version.outputs.version }}" --repo "${{ github.repository }}" --draft=false --latest
